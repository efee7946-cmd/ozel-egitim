<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Silme – YıldızCan</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.7; }
  h1 { color: #0f9d8f; }
  .card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 12px; padding: 24px; margin-top: 24px; }
  input { width: 100%; padding: 10px 14px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
  button { background: #e53935; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; }
  button:hover { background: #c62828; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
  .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
  .msg.error { background: #ffebee; color: #c62828; display: block; }
</style>
</head>
<body>
<h1>Hesap Silme</h1>
<p>Hesabınızı ve ilişkili tüm verilerinizi kalıcı olarak silmek için aşağıdaki formu doldurun.</p>
<p><strong>Uyarı:</strong> Bu işlem geri alınamaz. Tüm öğrenci verileri, seans kayıtları ve profil bilgileri silinecektir.</p>

<div class="card">
  <label>Kullanıcı adı</label>
  <input type="text" id="username" placeholder="Kullanıcı adınız" />
  <label>Şifre</label>
  <input type="password" id="password" placeholder="Şifreniz" />
  <button onclick="deleteAccount()">Hesabımı Kalıcı Olarak Sil</button>
  <div class="msg" id="msg"></div>
</div>

<p style="margin-top:32px;font-size:0.9rem;color:#666">
  Sorun yaşıyorsanız: <a href="mailto:yildizsiniflari@gmail.com">yildizsiniflari@gmail.com</a>
</p>

<script>
async function deleteAccount() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  msg.textContent = '';

  if (!username || !password) {
    msg.className = 'msg error';
    msg.textContent = 'Kullanıcı adı ve şifre gerekli.';
    return;
  }

  try {
    const loginRes = await fetch('https://ozel-egitim.vercel.app/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const loginData = await loginRes.json();
    if (!loginData.ok) {
      msg.className = 'msg error';
      msg.textContent = 'Kullanıcı adı veya şifre yanlış.';
      return;
    }

    const delRes = await fetch('https://ozel-egitim.vercel.app/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', token: loginData.token })
    });
    const delData = await delRes.json();
    if (delData.ok) {
      msg.className = 'msg success';
      msg.textContent = 'Hesabınız ve tüm verileriniz başarıyla silindi.';
    } else {
      msg.className = 'msg error';
      msg.textContent = 'Silme işlemi başarısız: ' + (delData.error || 'Bilinmeyen hata');
    }
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Sunucuya bağlanılamadı.';
  }
}
</script>
</body>
</html>
