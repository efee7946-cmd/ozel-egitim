name: Android Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Web dosyalarını derle (www/)
        run: npm run build

      - name: Capacitor Android sync
        run: npx cap sync android

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Keystore dosyasını oluştur
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/keystore.jks

      - name: gradlew izinlerini düzelt
        run: chmod +x android/gradlew

      - name: Release AAB derle (Google Play)
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: AAB dosyasını artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: yildiz-siniflari-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
